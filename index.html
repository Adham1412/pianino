<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Pianino - Mega To'plam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f19; }
        
        .piano-wrapper {
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }
        #piano-container {
            position: relative;
            height: 280px;
            min-width: 900px;
            background: linear-gradient(to bottom, #111, #2d2d2d);
            border-radius: 8px 8px 12px 12px;
            padding: 10px 5px 5px 5px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), inset 0 5px 15px rgba(0,0,0,0.9);
            display: flex;
            touch-action: pan-x;
        }
        
        .white-key {
            position: relative;
            flex: 1;
            background: linear-gradient(to bottom, #fff 0%, #eaeaea 100%);
            border: 1px solid #aaa;
            border-bottom: 5px solid #999;
            border-radius: 0 0 6px 6px;
            margin: 0 1px;
            z-index: 1;
            transition: all 0.05s;
        }
        .white-key.active-press { background: #d4d4d4; border-bottom-width: 2px; transform: translateY(3px); }
        
        .black-key {
            position: absolute;
            width: 3.5%;
            height: 62%;
            background: linear-gradient(to bottom, #222, #000);
            border: 1px solid #000;
            border-bottom: 4px solid #222;
            border-radius: 0 0 5px 5px;
            z-index: 2;
            box-shadow: 2px 2px 6px rgba(0,0,0,0.6);
            transition: all 0.05s;
        }
        .black-key.active-press { border-bottom-width: 1px; transform: translateY(3px); }

        .highlight { background: #fca5a5 !important; box-shadow: 0 0 20px #ef4444 !important; }
        .highlight-black { background: #b91c1c !important; box-shadow: 0 0 15px #ef4444 !important; }
        
        .piano-wrapper::-webkit-scrollbar { height: 8px; }
        .piano-wrapper::-webkit-scrollbar-track { background: #1e293b; border-radius: 10px; }
        .piano-wrapper::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-2 sm:p-6 text-slate-200">

    <div class="w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl p-4 sm:p-6 border border-slate-700 mb-4">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
                Muallif: Adham
            </h1>
            <div id="status-badge" class="px-3 py-1 bg-slate-700 text-xs rounded-full border border-slate-600 font-semibold tracking-wider">Erkin Rejim</div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div class="col-span-1 md:col-span-2">
                <label class="block text-xs text-slate-400 mb-1">Mega To'plamdan kuy tanlang (20 ta):</label>
                <select id="song-select" class="w-full bg-slate-900 text-white p-3 rounded-lg border border-slate-600 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 overflow-y-auto" style="max-height: 200px;">
                    <option value="">-- Bu yerdan tanlang musiqani --</option>
                    
                    <optgroup label="🎬 Epik Kino Musiqalari">
                        <option value="godfather">The Godfather (Cho'qintirgan ota)</option>
                        <option value="avengers">Marvel - The Avengers</option>
                        <option value="interstellar">Interstellar (Asosiy Tema)</option>
                        <option value="harryPotter">Harry Potter (Hedwig's Theme)</option>
                        <option value="titanic">Titanic (My Heart Will Go On)</option>
                        <option value="pirates">Karib Dengizi Qaroqchilari</option>
                        <option value="starWars">Star Wars (Imperial March)</option>
                        <option value="missionImpossible">Mission: Impossible</option>
                        <option value="gameOfThrones">Game of Thrones</option>
                    </optgroup>
                    
                    <optgroup label="🎮 O'yinlar & Anime">
                        <option value="naruto">Naruto - Sadness and Sorrow</option>
                        <option value="mario">Super Mario Bros (Asosiy Tema)</option>
                        <option value="tetris">Tetris (Korobeiniki)</option>
                    </optgroup>

                    <optgroup label="🎧 Jahon Hitlari">
                        <option value="fadedLong">Alan Walker - Faded</option>
                        <option value="shapeOfYouLong">Ed Sheeran - Shape of You</option>
                        <option value="despacito">Luis Fonsi - Despacito</option>
                        <option value="rickroll">Rick Astley - Never Gonna Give You Up</option>
                        <option value="believerLong">Imagine Dragons - Believer</option>
                        <option value="coffinDance">Coffin Dance (Astronomia)</option>
                    </optgroup>

                    <optgroup label="🎼 Klassika">
                        <option value="moonlight">Betxoven - Oy Sonatasi (Moonlight)</option>
                        <option value="furEliseLong">Betxoven - Für Elise</option>
                    </optgroup>
                </select>
            </div>

            <div class="flex flex-col justify-center">
                <label class="block text-xs text-slate-400 mb-1">Ovoz balandligi:</label>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.7" class="w-full accent-blue-500">
            </div>
        </div>

        <div class="flex flex-wrap gap-3">
            <button id="listen-btn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-4 rounded-lg transition border border-slate-600">
                🎧 Tinglash (Demo)
            </button>
            <button id="learn-btn" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-lg transition shadow-lg shadow-blue-600/30">
                🎹 O'rganish
            </button>
            <button id="stop-btn" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-semibold py-3 px-4 rounded-lg transition hidden">
                ⏹ To'xtatish
            </button>
        </div>
        
        <div id="message" class="mt-4 h-6 text-center text-blue-400 font-medium text-sm sm:text-base"></div>
    </div>

    <div class="w-full max-w-4xl piano-wrapper">
        <div id="piano-container" class="select-none"></div>
    </div>
    <p class="text-xs text-slate-500 mt-2 text-center">📱 Telefonda boshqa notalarni ko'rish uchun klaviaturani yoniga suring</p>

    <script>
        const notes = [
            'C4','Db4','D4','Eb4','E4','F4','Gb4','G4','Ab4','A4','Bb4','B4',
            'C5','Db5','D5','Eb5','E5','F5','Gb5','G5','Ab5','A5','Bb5','B5',
            'C6'
        ];
        
        function getFreq(note) {
            const notesArray = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
            const octave = parseInt(note.slice(-1));
            const keyNumber = notesArray.indexOf(note.slice(0, -1));
            if (keyNumber < 0) return 0;
            const n = keyNumber - 9 + (octave - 4) * 12;
            return 440 * Math.pow(2, n / 12);
        }

        // =========================================================
        // 🎵 KUYLAR BAZASI (100 taga yetkazish uchun o'zingiz ham xuddi shunday qilib qo'shishingiz mumkin)
        // QO'LLANMA:
        // 1. Yangi qator oching: yongiqoshiq: ['C4', 'P', 'D4', ...],
        // 2. 'P' - bu pauza (kutish).
        // =========================================================
        const songs = {
            // --- KINO MUSIQALARI ---
            godfather: ['G4','C5','Eb5','D5','C5','Eb5','C5','D5','C5','Ab4','Bb4','G4','P','G4','C5','Eb5','D5','C5','Eb5','C5','D5','C5','G4','Gb4','F4'],
            avengers: ['G4','G4','G4','C5','G5','F5','E5','D5','C5','A4','P','A4','A4','A4','D5'],
            interstellar: ['A4','P','E5','P','A4','P','E5','P','A4','P','E5','P','B4','P','E5','P','B4','P','E5','P','C5','P','E5','P','C5','P','E5','P','D5','P','E5','P','D5','P','E5'],
            harryPotter: ['B4','P','E5','P','G5','Gb5','E5','P','B5','P','A5','P','P','Gb5','P','P','E5','P','G5','Gb5','Eb5','P','F5','P','B4','P','P','B4','P','E5','P','G5','Gb5','E5','P','B5','P','D6','Db6','C6','Ab5','C6','B5','Bb5','Gb5','G5','E5'],
            titanic: ['F4','G4','P','A4','G4','P','F4','G4','C5','Bb4','A4','F4','D4','C4','P','F4','G4','P','A4','G4','P','F4','G4','C5','A5','G5','F5','P','F4','F4','F4','F4','E4','F4','P','F4','E4','F4','P','G4','A4','G4'],
            pirates: ['A4','C5','D5','D5','P','D5','E5','F5','F5','P','F5','G5','E5','E5','P','D5','C5','C5','D5','P','A4','C5','D5','D5','P','D5','F5','G5','G5','P','G5','A5','Bb5','Bb5','A5','G5','A5','D5','P','D5','E5','F5','F5','G5','A5','D5','P','D5','F5','E5','E5','F5','D5'],
            starWars: ['A4','P','A4','P','A4','P','F4','C5','A4','P','F4','C5','A4','P','P','E5','P','E5','P','E5','P','F5','C5','Ab4','P','F4','C5','A4'],
            missionImpossible: ['G4','P','G4','P','Bb4','P','C5','P','G4','P','G4','P','F4','P','Gb4','P','G4','P','G4','P','Bb4','P','C5','P'],
            gameOfThrones: ['G4','C4','Eb4','F4','G4','C4','Eb4','F4','G4','C4','E4','F4','G4','C4','E4','F4'],

            // --- ANIME VA O'YINLAR ---
            naruto: ['C5','D5','Eb5','F5','G5','Eb5','C5','P','Bb4','C5','D5','F5','Bb4','G4','P','G4','Ab4','Bb4','C5','G4','F4','Eb4','D4'],
            mario: ['E5','E5','P','E5','P','C5','E5','P','G5','P','P','G4','P','P','C5','P','G4','P','E4','P','A4','P','B4','P','Bb4','A4','P'],
            tetris: ['E5','B4','C5','D5','C5','B4','A4','A4','C5','E5','D5','C5','B4','B4','C5','D5','E5','C5','A4','A4'],

            // --- JAHON HITLARI ---
            fadedLong: ['F5','F5','F5','D5','D5','D5','A4','A4','A4','Bb4','Bb4','Bb4','P','F5','F5','F5','D5','D5','D5','A4','A4','A4','Bb4','Bb4','Bb4','P','A4','C5','D5','F5','G5','A5','G5','F5'],
            shapeOfYouLong: ['Db5','Db5','E5','Db5','Db5','E5','Db5','Db5','E5','Db5','B4','A4','A4','A4','B4','Db5','P','Db5','Db5','E5','Db5','Db5','E5','Db5','Db5','E5','Db5','B4','A4','A4','A4','B4','Db5'],
            despacito: ['D4','E4','F4','G4','P','D5','C5','Bb4','A4','G4','P','A4','Bb4','C5','D5','E5','F5','G5','P','F5','E5','D5'],
            rickroll: ['F4','G4','Bb4','G4','D5','P','D5','P','C5','P','F4','G4','Bb4','G4','C5','P','C5','P','Bb4','A4','G4','P','F4','G4','Bb4','G4','Bb4','C5','A4','G4','F4'],
            believerLong: ['A4','A4','A4','A4','A4','Bb4','G4','G4','G4','G4','G4','A4','F4','P','A4','A4','A4','A4','A4','Bb4','G4','G4','G4','G4','G4','A4','F4','E4','F4','G4','A4'],
            coffinDance: ['F4','F4','F4','F4','D5','D5','C5','C5','Bb4','Bb4','A4','A4','A4','C5','Bb4','A4','G4','G4','G4','D5','Db5','C5','Bb4','A4'],

            // --- KLASSIKA ---
            moonlight: ['Ab4','Db5','F5','Ab4','Db5','F5','Ab4','Db5','F5','Ab4','Db5','F5','A4','Db5','Gb5','A4','Db5','Gb5','A4','D5','Gb5','A4','D5','Gb5'],
            furEliseLong: ['E5','Eb5','E5','Eb5','E5','B4','D5','C5','A4','P','C4','E4','A4','B4','P','E4','Ab4','B4','C5','P','E4','E5','Eb5','E5','Eb5','E5','B4','D5','C5','A4','P','C4','E4','A4','B4','P','E4','C5','B4','A4']
        };

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let masterGain;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                updateVolume();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateVolume() {
            if (masterGain) {
                const vol = document.getElementById('volume').value;
                masterGain.gain.value = vol;
            }
        }
        document.getElementById('volume').addEventListener('input', updateVolume);

        function playSound(noteName) {
            initAudio();
            const freq = getFreq(noteName);
            if (!freq) return;

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const noteGain = audioCtx.createGain();

            osc1.type = 'triangle'; 
            osc2.type = 'sine';
            
            osc1.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc2.frequency.setValueAtTime(freq * 2, audioCtx.currentTime);
            
            const osc2Gain = audioCtx.createGain();
            osc2Gain.gain.value = 0.15;
            osc2.connect(osc2Gain);

            osc1.connect(noteGain);
            osc2Gain.connect(noteGain);
            noteGain.connect(masterGain);

            const now = audioCtx.currentTime;
            noteGain.gain.setValueAtTime(0, now);
            noteGain.gain.linearRampToValueAtTime(1, now + 0.02);
            noteGain.gain.exponentialRampToValueAtTime(0.3, now + 0.5);
            noteGain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 2.1);
            osc2.stop(now + 2.1);
        }

        const container = document.getElementById('piano-container');
        let whiteKeyCount = 0;
        
        notes.forEach(note => { if (!note.includes('b')) whiteKeyCount++; });

        let currentWhiteIndex = 0;
        notes.forEach((note) => {
            const isBlack = note.includes('b');
            const key = document.createElement('div');
            
            if (!isBlack) {
                key.className = 'white-key cursor-pointer';
                key.dataset.note = note;
                container.appendChild(key);
                currentWhiteIndex++;
            } else {
                key.className = 'black-key cursor-pointer';
                key.dataset.note = note;
                const whiteWidthPercent = 100 / whiteKeyCount;
                key.style.left = `calc(${currentWhiteIndex * whiteWidthPercent}% - 1.75%)`;
                container.appendChild(key);
            }
        });

        let mode = 'free';
        let currentSong = [];
        let currentStep = 0;
        let demoTimeout;
        const msgEl = document.getElementById('message');
        const badge = document.getElementById('status-badge');
        const learnBtn = document.getElementById('learn-btn');
        const listenBtn = document.getElementById('listen-btn');
        const stopBtn = document.getElementById('stop-btn');
        const songSelect = document.getElementById('song-select');

        function clearHighlights() {
            document.querySelectorAll('.white-key, .black-key').forEach(k => {
                k.classList.remove('highlight', 'highlight-black');
            });
        }

        function highlightNote(note) {
            clearHighlights();
            const keyEl = document.querySelector(`[data-note="${note}"]`);
            if (keyEl) {
                if (keyEl.classList.contains('black-key')) {
                    keyEl.classList.add('highlight-black');
                } else {
                    keyEl.classList.add('highlight');
                }
                keyEl.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }
        }

        function stopAll() {
            clearTimeout(demoTimeout);
            clearHighlights();
            mode = 'free';
            badge.textContent = "Erkin Rejim";
            badge.className = "px-3 py-1 bg-slate-700 text-xs rounded-full border border-slate-600 font-semibold";
            msgEl.textContent = "";
            stopBtn.classList.add('hidden');
            learnBtn.classList.remove('hidden');
            listenBtn.classList.remove('hidden');
        }

        document.getElementById('stop-btn').addEventListener('click', stopAll);

        learnBtn.addEventListener('click', () => {
            const songKey = songSelect.value;
            if (!songKey) return msgEl.textContent = "⚠️ Avval ro'yxatdan birorta kuy tanlang!";
            
            stopAll();
            mode = 'learn';
            currentSong = songs[songKey].filter(n => n !== 'P');
            currentStep = 0;
            
            badge.textContent = "O'rganish Rejimi";
            badge.className = "px-3 py-1 bg-blue-600 text-xs rounded-full font-semibold animate-pulse";
            stopBtn.classList.remove('hidden');
            learnBtn.classList.add('hidden');
            listenBtn.classList.add('hidden');
            
            msgEl.textContent = "🎹 Yonib turgan tugmalarni bosing!";
            highlightNote(currentSong[currentStep]);
        });

        listenBtn.addEventListener('click', () => {
            const songKey = songSelect.value;
            if (!songKey) return msgEl.textContent = "⚠️ Avval ro'yxatdan birorta kuy tanlang!";
            
            stopAll();
            mode = 'demo';
            currentSong = songs[songKey];
            currentStep = 0;
            
            badge.textContent = "Tinglash Rejimi";
            badge.className = "px-3 py-1 bg-purple-600 text-xs rounded-full font-semibold pulse";
            stopBtn.classList.remove('hidden');
            learnBtn.classList.add('hidden');
            listenBtn.classList.add('hidden');
            
            msgEl.textContent = "🎧 Tinglab bahra oling...";
            playDemoStep();
        });

        function playDemoStep() {
            if (mode !== 'demo') return;
            if (currentStep >= currentSong.length) {
                setTimeout(stopAll, 1000);
                msgEl.textContent = "Kuy tugadi. Endi o'zingiz chalib ko'ring!";
                return;
            }

            const note = currentSong[currentStep];
            if (note === 'P') {
                currentStep++;
                demoTimeout = setTimeout(playDemoStep, 350); 
            } else {
                playSound(note);
                highlightNote(note);
                
                const keyEl = document.querySelector(`[data-note="${note}"]`);
                if(keyEl) keyEl.classList.add('active-press');
                
                setTimeout(() => {
                    if(keyEl) keyEl.classList.remove('active-press');
                }, 250);

                currentStep++;
                demoTimeout = setTimeout(playDemoStep, 450); 
            }
        }

        function handlePress(e) {
            e.preventDefault();
            const note = e.target.dataset.note;
            if (!note) return;

            e.target.classList.add('active-press');
            playSound(note);

            if (mode === 'learn') {
                if (note === currentSong[currentStep]) {
                    currentStep++;
                    if (currentStep < currentSong.length) {
                        highlightNote(currentSong[currentStep]);
                    } else {
                        msgEl.innerHTML = "🎉 <span class='text-green-400'>Ajoyib! Siz kuyni to'liq chaldingiz!</span>";
                        clearHighlights();
                        setTimeout(stopAll, 3000);
                    }
                }
            }
        }

        function handleRelease(e) {
            e.preventDefault();
            e.target.classList.remove('active-press');
        }

        const keys = document.querySelectorAll('.white-key, .black-key');
        keys.forEach(key => {
            key.addEventListener('mousedown', handlePress);
            key.addEventListener('mouseup', handleRelease);
            key.addEventListener('mouseleave', handleRelease);
            
            key.addEventListener('touchstart', handlePress, {passive: false});
            key.addEventListener('touchend', handleRelease, {passive: false});
        });
    </script>
</body>
</html>
