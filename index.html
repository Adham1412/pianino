<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobil Pianino Mega</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        /* Ekrandan chiqib ketmaslik va silkinmaslik uchun */
        html, body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; 
            height: 100dvh; 
            width: 100vw;
            margin: 0; 
            overflow: hidden; 
            touch-action: none; /* Brauzer default harakatlarini to'sish */
        }
        
        /* Pianino hududi */
        .piano-wrapper {
            flex-grow: 1;
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            background: linear-gradient(to bottom, #111, #222);
            position: relative;
        }
        
        #piano-container {
            height: 100%;
            min-width: 1100px; /* Tugmalar kengroq bo'lishi uchun uzunlik oshirildi */
            display: flex;
            position: relative;
        }
        
        /* Oq tugmalar */
        .white-key {
            flex: 1;
            background: linear-gradient(to bottom, #fff 0%, #f4f4f4 100%);
            border: 1px solid #ccc;
            border-bottom: 6px solid #bbb;
            border-radius: 0 0 8px 8px;
            margin: 0 1px;
            z-index: 1;
        }
        .white-key.active-press { 
            background: #e5e5e5; 
            border-bottom-width: 2px; 
            transform: translateY(4px); 
        }
        
        /* Qora tugmalar */
        .black-key {
            position: absolute;
            width: 3.2%; /* Qora tugma qalinligi */
            height: 60%;
            background: linear-gradient(to bottom, #222, #000);
            border: 1px solid #000;
            border-bottom: 5px solid #333;
            border-radius: 0 0 6px 6px;
            z-index: 2;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }
        .black-key.active-press { 
            border-bottom-width: 1px; 
            transform: translateY(4px); 
        }

        /* O'rgatish ranglari */
        .highlight { background: #fca5a5 !important; box-shadow: inset 0 0 15px #ef4444 !important; }
        .highlight-black { background: #b91c1c !important; box-shadow: inset 0 0 10px #ef4444 !important; }
        
        /* Scrollbar yashirish (mobil uchun toza ko'rinish) */
        .piano-wrapper::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col text-slate-200">

    <div class="bg-slate-800 border-b border-slate-700 shadow-lg p-2 shrink-0 z-10 flex flex-col gap-2">
        
        <div class="flex gap-2 h-10">
            <select id="song-select" class="flex-grow bg-slate-900 text-white px-2 py-1 rounded border border-slate-600 outline-none focus:border-blue-500 text-sm appearance-none">
                <option value="">Erkin chalish...</option>
                <optgroup label="🎬 Kino Musiqalari">
                    <option value="godfather">The Godfather (Cho'qintirgan ota)</option>
                    <option value="interstellar">Interstellar</option>
                    <option value="harryPotter">Harry Potter</option>
                    <option value="titanic">Titanic</option>
                    <option value="pirates">Karib Qaroqchilari</option>
                    <option value="starWars">Star Wars</option>
                </optgroup>
                <optgroup label="🎧 Hitlar & O'yinlar">
                    <option value="fadedLong">Alan Walker - Faded</option>
                    <option value="shapeOfYouLong">Ed Sheeran - Shape of You</option>
                    <option value="despacito">Luis Fonsi - Despacito</option>
                    <option value="naruto">Naruto - Sadness and Sorrow</option>
                    <option value="mario">Super Mario Bros</option>
                </optgroup>
                <optgroup label="🎼 Klassika">
                    <option value="furEliseLong">Betxoven - Für Elise</option>
                    <option value="moonlight">Betxoven - Moonlight Sonata</option>
                </optgroup>
            </select>
            
            <button id="learn-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 rounded text-sm transition">
                🎹 O'rganish
            </button>
            <button id="listen-btn" class="bg-purple-600 hover:bg-purple-500 text-white font-bold px-4 rounded text-sm transition">
                🎧 Tinglash
            </button>
            <button id="stop-btn" class="bg-red-600 hover:bg-red-500 text-white font-bold px-4 rounded text-sm transition hidden">
                ⏹ To'xtash
            </button>
        </div>

        <div class="flex justify-between items-center text-xs h-6">
            <div id="message" class="text-blue-400 font-medium truncate pr-2 w-2/3">📱 Telefonni yotiq ushlang</div>
            <div class="flex items-center gap-2 w-1/3 justify-end">
                <span class="text-slate-400">Ovoz:</span>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.8" class="w-16 accent-blue-500">
            </div>
        </div>
    </div>

    <div class="piano-wrapper" id="scroll-area">
        <div id="piano-container">
            </div>
    </div>

    <script>
        const notes = [
            'C4','Db4','D4','Eb4','E4','F4','Gb4','G4','Ab4','A4','Bb4','B4',
            'C5','Db5','D5','Eb5','E5','F5','Gb5','G5','Ab5','A5','Bb5','B5',
            'C6','Db6','D6','Eb6','E6','F6','Gb6','G6','Ab6','A6','Bb6','B6','C7' // Diapazon biroz oshirildi
        ];
        
        function getFreq(note) {
            const notesArray = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
            const octave = parseInt(note.slice(-1));
            const keyNumber = notesArray.indexOf(note.slice(0, -1));
            if (keyNumber < 0) return 0;
            const n = keyNumber - 9 + (octave - 4) * 12;
            return 440 * Math.pow(2, n / 12);
        }

        // --- Kuylar Bazasi (Qisqartirilgan, lekin mega bazadagi kuylar saqlab qolingan) ---
        const songs = {
            godfather: ['G4','C5','Eb5','D5','C5','Eb5','C5','D5','C5','Ab4','Bb4','G4','P','G4','C5','Eb5','D5','C5','Eb5','C5','D5','C5','G4','Gb4','F4'],
            interstellar: ['A4','P','E5','P','A4','P','E5','P','A4','P','E5','P','B4','P','E5','P','B4','P','E5','P','C5','P','E5','P','C5','P','E5','P','D5','P','E5','P','D5','P','E5'],
            harryPotter: ['B4','P','E5','P','G5','Gb5','E5','P','B5','P','A5','P','P','Gb5','P','P','E5','P','G5','Gb5','Eb5','P','F5','P','B4'],
            titanic: ['F4','G4','P','A4','G4','P','F4','G4','C5','Bb4','A4','F4','D4','C4','P','F4','G4','P','A4','G4','P','F4','G4','C5','A5','G5','F5'],
            pirates: ['A4','C5','D5','D5','P','D5','E5','F5','F5','P','F5','G5','E5','E5','P','D5','C5','C5','D5','P','A4','C5','D5','D5','P','D5','F5','G5','G5','P','G5','A5','Bb5','Bb5','A5','G5','A5','D5'],
            starWars: ['A4','P','A4','P','A4','P','F4','C5','A4','P','F4','C5','A4','P','P','E5','P','E5','P','E5','P','F5','C5','Ab4','P','F4','C5','A4'],
            fadedLong: ['F5','F5','F5','D5','D5','D5','A4','A4','A4','Bb4','Bb4','Bb4','P','F5','F5','F5','D5','D5','D5','A4','A4','A4','Bb4','Bb4','Bb4'],
            shapeOfYouLong: ['Db5','Db5','E5','Db5','Db5','E5','Db5','Db5','E5','Db5','B4','A4','A4','A4','B4','Db5'],
            despacito: ['D4','E4','F4','G4','P','D5','C5','Bb4','A4','G4','P','A4','Bb4','C5','D5','E5','F5','G5'],
            naruto: ['C5','D5','Eb5','F5','G5','Eb5','C5','P','Bb4','C5','D5','F5','Bb4','G4'],
            mario: ['E5','E5','P','E5','P','C5','E5','P','G5','P','P','G4','P','P','C5','P','G4','P','E4'],
            furEliseLong: ['E5','Eb5','E5','Eb5','E5','B4','D5','C5','A4','P','C4','E4','A4','B4','P','E4','Ab4','B4','C5'],
            moonlight: ['Ab4','Db5','F5','Ab4','Db5','F5','Ab4','Db5','F5','Ab4','Db5','F5','A4','Db5','Gb5']
        };

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let masterGain;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                masterGain = audioCtx.createGain();
                masterGain.connect(audioCtx.destination);
                updateVolume();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function updateVolume() {
            if (masterGain) {
                masterGain.gain.value = document.getElementById('volume').value;
            }
        }
        document.getElementById('volume').addEventListener('input', updateVolume);

        function playSound(noteName) {
            initAudio();
            const freq = getFreq(noteName);
            if (!freq) return;

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const noteGain = audioCtx.createGain();

            osc1.type = 'triangle'; 
            osc2.type = 'sine';
            
            osc1.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc2.frequency.setValueAtTime(freq * 2, audioCtx.currentTime);
            
            const osc2Gain = audioCtx.createGain();
            osc2Gain.gain.value = 0.15;
            osc2.connect(osc2Gain);

            osc1.connect(noteGain);
            osc2Gain.connect(noteGain);
            noteGain.connect(masterGain);

            const now = audioCtx.currentTime;
            noteGain.gain.setValueAtTime(0, now);
            noteGain.gain.linearRampToValueAtTime(1, now + 0.02);
            noteGain.gain.exponentialRampToValueAtTime(0.3, now + 0.5);
            noteGain.gain.exponentialRampToValueAtTime(0.001, now + 2.0);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + 2.1);
            osc2.stop(now + 2.1);
        }

        // --- Klaviaturani Yaratish ---
        const container = document.getElementById('piano-container');
        let whiteKeyCount = 0;
        notes.forEach(note => { if (!note.includes('b')) whiteKeyCount++; });

        let currentWhiteIndex = 0;
        notes.forEach((note) => {
            const isBlack = note.includes('b');
            const key = document.createElement('div');
            
            if (!isBlack) {
                key.className = 'white-key';
                key.dataset.note = note;
                container.appendChild(key);
                currentWhiteIndex++;
            } else {
                key.className = 'black-key';
                key.dataset.note = note;
                const whiteWidthPercent = 100 / whiteKeyCount;
                key.style.left = `calc(${currentWhiteIndex * whiteWidthPercent}% - 1.6%)`; // Qora tugmani o'rtaga to'g'rilash
                container.appendChild(key);
            }
        });

        // --- Dastur Logikasi ---
        let mode = 'free';
        let currentSong = [];
        let currentStep = 0;
        let demoTimeout;
        const msgEl = document.getElementById('message');
        const songSelect = document.getElementById('song-select');
        const scrollArea = document.getElementById('scroll-area');

        // Boshlang'ich holatda o'rtaga (C5 atrofida) surib qo'yish
        window.onload = () => {
            setTimeout(() => {
                scrollArea.scrollLeft = (scrollArea.scrollWidth - scrollArea.clientWidth) / 2;
            }, 100);
        };

        function highlightNote(note) {
            document.querySelectorAll('.white-key, .black-key').forEach(k => {
                k.classList.remove('highlight', 'highlight-black');
            });
            const keyEl = document.querySelector(`[data-note="${note}"]`);
            if (keyEl) {
                keyEl.classList.add(keyEl.classList.contains('black-key') ? 'highlight-black' : 'highlight');
                // Notalar ekrandan tashqarida bo'lsa avtomatik surish
                keyEl.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function stopAll() {
            clearTimeout(demoTimeout);
            document.querySelectorAll('.white-key, .black-key').forEach(k => k.classList.remove('highlight', 'highlight-black', 'active-press'));
            mode = 'free';
            msgEl.textContent = "Erkin chalish rejimi";
            document.getElementById('stop-btn').classList.add('hidden');
            document.getElementById('learn-btn').classList.remove('hidden');
            document.getElementById('listen-btn').classList.remove('hidden');
        }

        document.getElementById('stop-btn').addEventListener('click', stopAll);

        document.getElementById('learn-btn').addEventListener('click', () => {
            if (!songSelect.value) return msgEl.textContent = "⚠️ Avval kuy tanlang!";
            stopAll();
            mode = 'learn';
            currentSong = songs[songSelect.value].filter(n => n !== 'P');
            currentStep = 0;
            
            document.getElementById('stop-btn').classList.remove('hidden');
            document.getElementById('learn-btn').classList.add('hidden');
            document.getElementById('listen-btn').classList.add('hidden');
            
            msgEl.textContent = "🎹 Qizil yongan tugmani bosing";
            highlightNote(currentSong[currentStep]);
        });

        document.getElementById('listen-btn').addEventListener('click', () => {
            if (!songSelect.value) return msgEl.textContent = "⚠️ Avval kuy tanlang!";
            stopAll();
            mode = 'demo';
            currentSong = songs[songSelect.value];
            currentStep = 0;
            
            document.getElementById('stop-btn').classList.remove('hidden');
            document.getElementById('learn-btn').classList.add('hidden');
            document.getElementById('listen-btn').classList.add('hidden');
            
            msgEl.textContent = "🎧 Tinglab bahra oling...";
            playDemoStep();
        });

        function playDemoStep() {
            if (mode !== 'demo') return;
            if (currentStep >= currentSong.length) {
                setTimeout(stopAll, 1000);
                msgEl.textContent = "Tugadi. O'zingiz sinab ko'ring!";
                return;
            }

            const note = currentSong[currentStep];
            if (note === 'P') {
                currentStep++;
                demoTimeout = setTimeout(playDemoStep, 350); 
            } else {
                playSound(note);
                highlightNote(note);
                const keyEl = document.querySelector(`[data-note="${note}"]`);
                if(keyEl) keyEl.classList.add('active-press');
                setTimeout(() => { if(keyEl) keyEl.classList.remove('active-press'); }, 250);
                currentStep++;
                demoTimeout = setTimeout(playDemoStep, 450); 
            }
        }

        // --- Touch va Mouse boshqaruvi ---
        function press(e) {
            // Ekranni tepa-pastga siljishini oldini olish
            if (e.cancelable) e.preventDefault(); 
            const note = e.target.dataset.note;
            if (!note) return;

            e.target.classList.add('active-press');
            playSound(note);

            if (mode === 'learn' && note === currentSong[currentStep]) {
                currentStep++;
                if (currentStep < currentSong.length) {
                    highlightNote(currentSong[currentStep]);
                } else {
                    msgEl.textContent = "🎉 Qoyil! Tugatdingiz!";
                    setTimeout(stopAll, 2000);
                }
            }
        }

        function release(e) {
            if (e.cancelable) e.preventDefault();
            e.target.classList.remove('active-press');
        }

        const keys = document.querySelectorAll('.white-key, .black-key');
        keys.forEach(key => {
            key.addEventListener('mousedown', press);
            key.addEventListener('mouseup', release);
            key.addEventListener('mouseleave', release);
            
            // Mobil ekranlar uchun Touch Event'lari
            key.addEventListener('touchstart', press, {passive: false});
            key.addEventListener('touchend', release, {passive: false});
            key.addEventListener('touchcancel', release, {passive: false});
        });
    </script>
</body>
</html>
